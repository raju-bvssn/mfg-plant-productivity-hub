<template>
    <template if:true={data}>

        <!-- ===================== -->
        <!-- ACTIVE PLANT PROGRAMS -->
        <!-- ===================== -->
        <template if:true={planOfRecord}>
            <article class="slds-card custom-card">

                <!-- Header -->
                <div class="slds-card__header slds-grid">
                    <header class="slds-media slds-media_center slds-has-flexi-truncate">

                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:product" size="small"></lightning-icon>
                        </div>

                        <div class="slds-media__body">
                            <h2 class="slds-card__header-title">
                                Active Plant Programs - {planOfRecord.programCount}
                            </h2>
                        </div>

                    </header>
                </div>

                <!-- Table -->
                <div class="slds-card__body slds-card__body_inner">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">

                        <thead>
                            <tr>
                                <th scope="col">Plant Program</th>
                                <th scope="col">Plant Program URL</th>
                                <th scope="col">Positions</th>
                            </tr>
                        </thead>

                        <tbody>
                            <template for:each={planOfRecord.programs} for:item="prog">
                                <tr key={prog.programId}>

                                    <!-- Program Name -->
                                    <td>
                                        {prog.programName}
                                    </td>

                                    <td>
                                        <a href={prog.programUrl} target="_blank">View Plant Program</a>
                                    </td>

                                    <!-- Positions -->
                                    <td>
                                        {prog.positions}
                                    </td>

                                </tr>
                            </template>
                        </tbody>

                    </table>
                </div>

            </article>
        </template>


        <!-- ===================== -->
        <!-- ACTIVE STUDIES -->
        <!-- ===================== -->
        <template if:true={study}>
            <article class="slds-card custom-card">

                <!-- Header -->
                <div class="slds-card__header slds-grid">
                    <header class="slds-media slds-media_center slds-has-flexi-truncate">

                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:dataset" size="small"></lightning-icon>
                        </div>

                        <div class="slds-media__body">
                            <h2 class="slds-card__header-title">
                                Active Studies - {study.programCount}
                            </h2>
                        </div>

                    </header>
                </div>

                <!-- Table -->
                <div class="slds-card__body slds-card__body_inner">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">

                        <thead>
                            <tr>
                                <th scope="col">Study</th>
                                <th scope="col">Plant Program URL</th>
                                <th scope="col">Positions</th>
                            </tr>
                        </thead>

                        <tbody>
                            <template for:each={study.programs} for:item="prog">
                                <tr key={prog.programId}>

                                    <!-- Study Name -->
                                    <td>
                                        {prog.programName}
                                    </td>

                                    <td>
                                        <a href={prog.programUrl} target="_blank">View Plant Program</a>
                                    </td>

                                    <!-- Positions -->
                                    <td>
                                        {prog.positions}
                                    </td>

                                </tr>
                            </template>
                        </tbody>

                    </table>
                </div>

            </article>
        </template>

    </template>
</template>

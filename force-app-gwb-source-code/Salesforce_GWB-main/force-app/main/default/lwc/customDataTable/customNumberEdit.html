    <input 
        type="number" 
        data-inputable="true"
        class="compact-number-input"
        value={value}
        step="1"
        onchange={handleChange}
        onblur={handleBlur}
        style="width: 50px; padding: 2px 4px; font-size: 12px; height: 24px; text-align: right; border: 1px solid #dddbda; border-radius: 4px;">
</template>

# Salesforce Connected App OAuth2 credentials
# Replace with actual values — use Anypoint Secure Properties for production
salesforce.username=REPLACE_WITH_SF_USERNAME
salesforce.password=REPLACE_WITH_SF_PASSWORD
salesforce.token=REPLACE_WITH_SF_SECURITY_TOKEN
salesforce.consumerKey=REPLACE_WITH_CONNECTED_APP_CLIENT_ID
salesforce.consumerSecret=REPLACE_WITH_CONNECTED_APP_CLIENT_SECRET
salesforce.instance=https://REPLACE_WITH_SF_INSTANCE.salesforce.com

# Slack incoming webhook URL
slack.webhook.url=REPLACE_WITH_SLACK_WEBHOOK_URL

